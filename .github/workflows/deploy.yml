name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub UI

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 521434189536.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: prospera-cluster
  ALB_DNS: prospera-alb-1976320130.us-east-1.elb.amazonaws.com

jobs:
  # ========================================================================
  #  Detectar cambios en directorios específicos
  # ========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            worker:
              - 'worker/**'

  # ========================================================================
  #  Build y push de Backend (solo si hay cambios)
  # ========================================================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        working-directory: backend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ env.ECR_REGISTRY }}/prospera-backend:$IMAGE_TAG .
          docker tag ${{ env.ECR_REGISTRY }}/prospera-backend:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/prospera-backend:latest
          docker push ${{ env.ECR_REGISTRY }}/prospera-backend:$IMAGE_TAG
          docker push ${{ env.ECR_REGISTRY }}/prospera-backend:latest
          echo "BACKEND_IMAGE=${{ env.ECR_REGISTRY }}/prospera-backend:$IMAGE_TAG" >> $GITHUB_ENV

  # ========================================================================
  #  Build y push de Frontend (solo si hay cambios)
  # ========================================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            --build-arg REACT_APP_API_URL=http://${{ env.ALB_DNS }}/api \
            -t ${{ env.ECR_REGISTRY }}/prospera-frontend:$IMAGE_TAG .
          docker tag ${{ env.ECR_REGISTRY }}/prospera-frontend:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/prospera-frontend:latest
          docker push ${{ env.ECR_REGISTRY }}/prospera-frontend:$IMAGE_TAG
          docker push ${{ env.ECR_REGISTRY }}/prospera-frontend:latest
          echo "FRONTEND_IMAGE=${{ env.ECR_REGISTRY }}/prospera-frontend:$IMAGE_TAG" >> $GITHUB_ENV

  # ========================================================================
  #  Build y push de Worker (solo si hay cambios)
  # ========================================================================
  build-worker:
    name: Build Worker
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push worker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -f worker/Dockerfile -t ${{ env.ECR_REGISTRY }}/prospera-worker:$IMAGE_TAG .
          docker tag ${{ env.ECR_REGISTRY }}/prospera-worker:$IMAGE_TAG ${{ env.ECR_REGISTRY }}/prospera-worker:latest
          docker push ${{ env.ECR_REGISTRY }}/prospera-worker:$IMAGE_TAG
          docker push ${{ env.ECR_REGISTRY }}/prospera-worker:latest
          echo "WORKER_IMAGE=${{ env.ECR_REGISTRY }}/prospera-worker:$IMAGE_TAG" >> $GITHUB_ENV

  # ========================================================================
  #  Deploy Backend (solo en push a main)
  # ========================================================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [changes, build-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.backend == 'true'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment for Backend
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service prospera-backend \
            --force-new-deployment

      - name: Wait for Backend to stabilize
        run: |
          echo "Waiting for Backend service to reach stable state..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services prospera-backend

      - name: Wait additional 3 minutes
        run: sleep 180

  # ========================================================================
  #  Deploy Worker (solo en push a main, después de Backend)
  # ========================================================================
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: [changes, build-worker, deploy-backend]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.worker == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment for Worker
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service prospera-worker \
            --force-new-deployment

      - name: Wait for Worker to stabilize
        run: |
          echo "Waiting for Worker service to reach stable state..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services prospera-worker

      - name: Wait additional 3 minutes
        run: sleep 180

  # ========================================================================
  #  Deploy Frontend (solo en push a main, después de Worker)
  # ========================================================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes, build-frontend, deploy-worker]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.deploy-worker.result == 'success' || needs.deploy-worker.result == 'skipped')
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment for Frontend
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service prospera-frontend \
            --force-new-deployment

      - name: Wait for Frontend to stabilize
        run: |
          echo "Waiting for Frontend service to reach stable state..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services prospera-frontend

      - name: Wait additional 3 minutes
        run: sleep 180

  # ========================================================================
  #  Health Check (solo si todos los builds/deploys fueron exitosos)
  # ========================================================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend, build-worker, deploy-backend, deploy-worker, deploy-frontend]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (
        (needs.changes.outputs.backend != 'true' || (needs.build-backend.result == 'success' && needs.deploy-backend.result == 'success')) &&
        (needs.changes.outputs.frontend != 'true' || (needs.build-frontend.result == 'success' && needs.deploy-frontend.result == 'success')) &&
        (needs.changes.outputs.worker != 'true' || (needs.build-worker.result == 'success' && needs.deploy-worker.result == 'success'))
      ) &&
      (
        needs.deploy-backend.result == 'success' ||
        needs.deploy-worker.result == 'success' ||
        needs.deploy-frontend.result == 'success'
      )
    steps:
      - name: Check Backend health endpoint
        run: |
          echo "Checking backend health at http://${{ env.ALB_DNS }}/health"
          max_attempts=30
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.ALB_DNS }}/health)
            
            if [ "$response" = "200" ]; then
              echo "✅ Health check passed! Backend is healthy."
              exit 0
            fi
            
            attempt=$((attempt + 1))
            echo "⏳ Attempt $attempt/$max_attempts: Received HTTP $response, retrying in 20 seconds..."
            sleep 20
          done
          
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1

      - name: Report deployment success
        if: success()
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "Backend: http://${{ env.ALB_DNS }}/health"
          echo "Frontend: http://${{ env.ALB_DNS }}/"
