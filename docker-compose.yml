version: '3.8'
services:

  localstack:
    image: localstack/localstack:latest
    container_name: prospera_localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - ./localstack-init.sh:/etc/localstack/init/ready.d/localstack-init.sh:ro
      - localstack_data:/var/lib/localstack
    # Si usas Docker Compose v1 y tienes errores, comenta o elimina el healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  sqs-init:
    image: amazon/aws-cli
    container_name: prospera_sqs_init
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        echo 'Creando cola SQS...' &&
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name test-queue &&
        echo 'Cola SQS creada exitosamente' &&
        echo 'Creando tabla DynamoDB jobs...' &&
        aws --endpoint-url=http://localstack:4566 dynamodb create-table --table-name jobs --attribute-definitions AttributeName=job_id,AttributeType=S AttributeName=user_id,AttributeType=S --key-schema AttributeName=job_id,KeyType=HASH --global-secondary-indexes 'IndexName=UserIdIndex,KeySchema=[{AttributeName=user_id,KeyType=HASH}],Projection={ProjectionType=ALL},ProvisionedThroughput={ReadCapacityUnits=5,WriteCapacityUnits=5}' --provisioned-throughput ReadCapacityUnits=5,WriteCapacityUnits=5 &&
        echo 'Tabla DynamoDB creada exitosamente' &&
        aws --endpoint-url=http://localstack:4566 sqs list-queues &&
        aws --endpoint-url=http://localstack:4566 dynamodb list-tables
      "
    depends_on:
      localstack:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: prospera_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - SQS_QUEUE_NAME=${SQS_QUEUE_NAME:-test-queue}
      - SQS_ENDPOINT=http://localstack:4566
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - DYNAMODB_TABLE_NAME=${DYNAMODB_TABLE_NAME:-jobs}
    command: ["python", "main.py"]
    depends_on:
      localstack:
        condition: service_healthy
      sqs-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: prospera_worker
    volumes:
      - ./backend:/app/backend
      - ./worker:/app/worker
    environment:
      - PYTHONUNBUFFERED=1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - SQS_QUEUE_NAME=${SQS_QUEUE_NAME:-test-queue}
      - SQS_ENDPOINT=http://localstack:4566
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - DYNAMODB_TABLE_NAME=${DYNAMODB_TABLE_NAME:-jobs}
    depends_on:
      localstack:
        condition: service_healthy
      sqs-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    container_name: prospera_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: ["npm", "start"]
    depends_on:
      - backend

volumes:
  localstack_data: