version: '3.8'
services:
  backend:
    build:
      context: ./backend
    container_name: prospera_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "main.py"]

  frontend:
    build:
      context: ./frontend
    container_name: prospera_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: ["npm", "start"]
    depends_on:
      - backend
