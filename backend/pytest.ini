[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=65

markers =
    unit: Unit tests con mocks
    integration: Integration tests con servicios reales
    slow: Tests que tardan más de 1 segundo
